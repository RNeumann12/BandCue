<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>BandCue</title>
  </head>
  <body>
    <main>
      <header>
        <span class="eyebrow">Songsterr adapter</span>
        <h1>BandCue</h1>
      </header>
      <section class="status-card" aria-live="polite">
        <div>
          <span class="label">Connection</span>
          <strong id="connectionState">Not connected</strong>
        </div>
        <span id="connectionDot" class="dot"></span>
      </section>
      <label>
        Room, port, or URL
        <input id="roomUrl" type="text" placeholder="4173 or ABC123" />
      </label>
      <section id="qrScanner" class="qr-scanner" hidden>
        <video id="qrVideo" playsinline muted></video>
        <div class="qr-scanner-footer">
          <span id="qrStatus">Point your camera at the BandCue join QR code.</span>
          <button id="openCameraScan" type="button" hidden>Camera</button>
          <button id="stopQrScan" type="button">Close</button>
        </div>
      </section>
      <div class="connection-actions">
        <button id="connect" type="button">Connect</button>
        <button id="scanQr" type="button">Scan QR</button>
        <button id="disconnect" type="button">Disconnect</button>
      </div>
      <div class="row transport-row">
        <button id="play" type="button">Play</button>
        <button id="stop" type="button">Stop</button>
      </div>
      <label>
        My instrument
        <select id="instrument">
          <option value="auto">Auto (match my open tab)</option>
          <option value="guitar">Guitar</option>
          <option value="bass">Bass</option>
          <option value="drum">Drums</option>
        </select>
      </label>
      <label class="checkbox">
        <input id="suppressAutoOpen" type="checkbox" />
        Don't auto-open Songsterr tabs (MuseScore host)
      </label>
      <div class="readout">
        <span id="adapterState">Songsterr not found</span>
        <span id="status">Enter a room and press Connect.</span>
        <span id="commandState"></span>
      </div>
    </main>
    <script src="vendor/jsQR.js"></script>
    <script src="room-permissions.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
